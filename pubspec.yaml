name: prism
description: "AI-powered GitHub client for reviewing PRs, tracking issues, and staying on top of your repositories."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  graphql_flutter: ^5.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.5
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  google_generative_ai: ^0.4.6
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.16
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
